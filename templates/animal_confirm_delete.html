{% extends 'base.html' %}

{% block content %}
  <div class="card">
    <div class="card-body">
      <h3>Confirmar exclusão</h3>
      <p>Tem certeza que deseja excluir o animal <strong>{{ animal.nome }}</strong>?</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Excluir</button>
        <a href="{% url 'core:animal_list' %}" class="btn btn-outline-secondary">Cancelar</a>
      </form>
    </div>
  </div>
{% endblock %}
