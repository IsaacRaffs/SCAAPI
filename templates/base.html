{% load static %}
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SCAAPI - Sistema de Cadastro de Animais da APIPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
  </head>
  <body>
    <header class="navbar navbar-expand-lg mb-4 bg-brand">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'core:home' %}">
          <span class="logo-circle">AP</span>
          <span>SCAAPI</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link text-white" href="{% url 'core:home' %}">Home</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="{% url 'core:animal_list' %}">Animais</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="{% url 'core:adotante_list' %}">Adotantes</a></li>
          </ul>
        </div>
      </div>
    </header>

    <main class="container mb-5">
      {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-4 border-top mt-4">
      <div class="container">
        <p class="mb-1">SCAAPI &copy; 2026 | Sistema de Cadastro de Animais da APIPA</p>
        <small class="text-muted">Desenvolvido para auxiliar no gerenciamento de adoções e cadastros.</small>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
